name: rust-build-cross-platform

permissions:
  contents: write

on:
  push:
    paths:
      - "slurm-assistant/**"
      - "install-slurm-assistant.sh"
      - "install-slurm-assistant.ps1"
      - ".github/workflows/rust-build-cross-platform.yml"
    tags:
      - "v*"
  pull_request:
    paths:
      - "slurm-assistant/**"
      - "install-slurm-assistant.sh"
      - "install-slurm-assistant.ps1"
      - ".github/workflows/rust-build-cross-platform.yml"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Git tag for GitHub Release, e.g. v0.1.0"
        required: false
        type: string

jobs:
  build-binaries:
    name: build-${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-amd64
            runner: ubuntu-latest
            artifact_name: slurm-assistant-linux-amd64
            file_suffix: linux-amd64
            rust_target: x86_64-unknown-linux-gnu
            target_dir: target/x86_64-unknown-linux-gnu/release
            bin_ext: ""
          - label: macos-amd64
            runner: macos-latest
            artifact_name: slurm-assistant-macos-amd64
            file_suffix: macos-amd64
            rust_target: x86_64-apple-darwin
            target_dir: target/x86_64-apple-darwin/release
            bin_ext: ""
          - label: macos-arm64
            runner: macos-latest
            artifact_name: slurm-assistant-macos-arm64
            file_suffix: macos-arm64
            rust_target: aarch64-apple-darwin
            target_dir: target/aarch64-apple-darwin/release
            bin_ext: ""
          - label: windows-amd64
            runner: windows-latest
            artifact_name: slurm-assistant-windows-amd64
            file_suffix: windows-amd64
            rust_target: x86_64-pc-windows-msvc
            target_dir: target/x86_64-pc-windows-msvc/release
            bin_ext: ".exe"

    defaults:
      run:
        working-directory: slurm-assistant/rust

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.rust_target }} --bin slurm-client --bin slurm-server

      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "${{ matrix.target_dir }}/slurm-client${{ matrix.bin_ext }}" "dist/slurm-client-${{ matrix.file_suffix }}${{ matrix.bin_ext }}"
          cp "${{ matrix.target_dir }}/slurm-server${{ matrix.bin_ext }}" "dist/slurm-server-${{ matrix.file_suffix }}${{ matrix.bin_ext }}"

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: slurm-assistant/rust/dist/*
          if-no-files-found: error

  publish-release:
    name: publish-release
    needs: build-binaries
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release_tag != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ github.event.inputs.release_tag }}" ]]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Build release bundles
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-flat

          copy_skill_runtime() {
            local target_dir="$1"
            mkdir -p "${target_dir}/skill/slurm-assistant"
            cp slurm-assistant/SKILL.md "${target_dir}/skill/slurm-assistant/"
            cp -R slurm-assistant/references "${target_dir}/skill/slurm-assistant/"
          }

          build_unix_bundle() {
            local suffix="$1"
            local artifact_name="slurm-assistant-${suffix}"
            local root_dir="bundle-${suffix}/slurm-assistant-${suffix}"

            mkdir -p "${root_dir}/package/bin"
            cp install-slurm-assistant.sh "${root_dir}/"
            cp install-slurm-assistant.ps1 "${root_dir}/"
            cp "release-assets/${artifact_name}/slurm-client-${suffix}" "${root_dir}/package/bin/slurm-client"
            cp "release-assets/${artifact_name}/slurm-server-${suffix}" "${root_dir}/package/bin/slurm-server"
            copy_skill_runtime "${root_dir}/package"

            tar -C "bundle-${suffix}" -czf "release-flat/slurm-assistant-${suffix}.tar.gz" "slurm-assistant-${suffix}"
          }

          build_windows_bundle() {
            local suffix="windows-amd64"
            local artifact_name="slurm-assistant-${suffix}"
            local root_dir="bundle-${suffix}/slurm-assistant-${suffix}"

            mkdir -p "${root_dir}/package/bin"
            cp install-slurm-assistant.sh "${root_dir}/"
            cp install-slurm-assistant.ps1 "${root_dir}/"
            cp "release-assets/${artifact_name}/slurm-client-${suffix}.exe" "${root_dir}/package/bin/slurm-client.exe"
            cp "release-assets/${artifact_name}/slurm-server-${suffix}.exe" "${root_dir}/package/bin/slurm-server.exe"
            copy_skill_runtime "${root_dir}/package"

            (
              cd "bundle-${suffix}"
              zip -qr "${GITHUB_WORKSPACE}/release-flat/slurm-assistant-${suffix}.zip" "slurm-assistant-${suffix}"
            )
          }

          build_unix_bundle linux-amd64
          build_unix_bundle macos-amd64
          build_unix_bundle macos-arm64
          build_windows_bundle

          ls -la release-flat

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.tag }}
          generate_release_notes: true
          files: release-flat/*
