name: slurm-assistant-eval

on:
  push:
    paths:
      - "slurm-assistant/evals/**"
      - "slurm-assistant/rust/scripts/live_smoke_gzu.sh"
      - ".github/workflows/slurm-assistant-eval.yml"
  workflow_dispatch:

jobs:
  eval-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate eval case file
        run: |
          jq -e 'type == "array" and length > 0' slurm-assistant/evals/cases.json >/dev/null
      - name: Ensure eval driver is executable
        run: test -x slurm-assistant/evals/run_eval.sh
      - name: Ensure live smoke script is executable
        run: test -x slurm-assistant/rust/scripts/live_smoke_gzu.sh
      - name: Smoke trace evaluator
        run: |
          tmp_trace="$(mktemp)"
          cat > "${tmp_trace}" <<'EOF'
          {
            "tool_calls": [
              {"tool": "functions.exec_command", "parameters": {"cmd": "cargo run --quiet --bin slurm-client -- server status --json"}},
              {"tool": "functions.exec_command", "parameters": {"cmd": "cargo run --quiet --bin slurm-client -- connection list --json"}},
              {"tool": "functions.exec_command", "parameters": {"cmd": "cargo run --quiet --bin slurm-client -- status --connection conn_gzu_cluster --gpu --json"}},
              {"tool": "functions.exec_command", "parameters": {"cmd": "cargo run --quiet --bin slurm-client -- find-gpu a10 --connection conn_gzu_cluster --json"}},
              {"tool": "functions.exec_command", "parameters": {"cmd": "cargo run --quiet --bin slurm-client -- jobs --connection conn_gzu_cluster --json"}},
              {"tool": "functions.exec_command", "parameters": {"cmd": "cargo run --quiet --bin slurm-client -- log 999999999 --connection conn_gzu_cluster --json"}}
            ]
          }
          EOF
          bash slurm-assistant/evals/run_eval.sh trace --trace "${tmp_trace}" >/dev/null

  live-cluster:
    runs-on: ubuntu-latest
    steps:
      - name: Gate by secret
        id: gate
        shell: bash
        run: |
          if [ -z "${{ secrets.GZU_SSH_KEY }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"
      - if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v4
      - if: steps.gate.outputs.enabled == 'true'
        uses: dtolnay/rust-toolchain@stable
      - if: steps.gate.outputs.enabled == 'true'
        uses: Swatinem/rust-cache@v2
      - name: Setup SSH key
        if: steps.gate.outputs.enabled == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GZU_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
      - name: Run live smoke
        if: steps.gate.outputs.enabled == 'true'
        env:
          SLURM_ASSISTANT_GZU_HOST: 210.40.56.85
          SLURM_ASSISTANT_GZU_PORT: 21563
          SLURM_ASSISTANT_GZU_USER: qiandingh
        run: |
          bash slurm-assistant/rust/scripts/live_smoke_gzu.sh
